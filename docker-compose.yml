name: wiki-edit-pipeline

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: wiki-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # KRaft cluster id — any 22-char base64 string is fine for a single-node demo.
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    mem_limit: 1g

  postgres:
    image: postgres:16
    container_name: wiki-postgres
    ports:
      # System postgres (if any) usually owns 5432 on the host; expose ours on 5544.
      - "5544:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      POSTGRES_USER: ${POSTGRES_USER:-wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wiki}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./warehouse/ddl:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-wiki} -d $${POSTGRES_DB:-wiki}"]
      interval: 5s
      timeout: 5s
      retries: 12
    mem_limit: 1g

  producer:
    build:
      context: ./ingestion
    container_name: wiki-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-wiki.edits}
      WIKI_SSE_URL: https://stream.wikimedia.org/v2/stream/recentchange
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_EVENTS_PUBLISHED: ${MAX_EVENTS_PUBLISHED:-100000}
    # Use "no" so the producer exits cleanly when it hits the cap, instead of restarting.
    restart: "no"
    mem_limit: 256m

  streaming:
    build:
      context: ./streaming
    container_name: wiki-streaming
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-wiki.edits}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      POSTGRES_USER: ${POSTGRES_USER:-wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wiki}
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
    volumes:
      - spark-checkpoints:/tmp/checkpoints
    restart: unless-stopped
    mem_limit: 3g

  dashboard:
    build:
      context: ./dashboard
    container_name: wiki-dashboard
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      POSTGRES_USER: ${POSTGRES_USER:-wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wiki}
    # Use the repo’s dashboard files at runtime so `app.py` fixes apply without rebuilding the image.
    volumes:
      - ./dashboard:/app
    restart: unless-stopped
    mem_limit: 512m

  # On-demand: `make batch` (or `docker compose --profile batch run --rm batch`)
  batch:
    build:
      context: ./batch
    container_name: wiki-batch
    profiles: ["batch"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      POSTGRES_USER: ${POSTGRES_USER:-wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wiki}
      SPARK_DRIVER_MEMORY: ${BATCH_DRIVER_MEMORY:-4g}
      CLICKSTREAM_PATH: /data/clickstream
      CLICKSTREAM_MONTH: ${CLICKSTREAM_MONTH:-2026-04}
      CLICKSTREAM_LANG: ${CLICKSTREAM_LANG:-en}
    volumes:
      - ./data:/data
    # Clickstream TSV is ~1.6 GB uncompressed; Spark JDBC needs extra headroom beyond driver heap.
    mem_limit: 8g

volumes:
  kafka-data:
  postgres-data:
  spark-checkpoints:
